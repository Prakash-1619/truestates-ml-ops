# ==============================================================================
# GLOBAL PATH CONFIGURATION  (DagsHub S3-compatible storage bucket)
# ==============================================================================
# DagsHub exposes a DVC/S3-compatible remote at:
#   s3://truestates-ml-ops/raw/...
# Configure once via:
#   dvc remote add origin s3://truestates-ml-ops -f
#   dvc remote modify origin endpointurl https://dagshub.com/poojariprakash88/truestates-ml-ops.s3
#   dvc remote modify origin --local access_key_id  <dagshub_token>
#   dvc remote modify origin --local secret_access_key <dagshub_token>
# ==============================================================================
# GLOBAL PATH CONFIGURATION
# ==============================================================================
# paths:
#   base_dir: "data/raw"
#   processed_dir: "data/processed"
#   s3_bucket: "truestates-ml-ops" #/s3:/truestates-ml-ops
#   s3_raw_prefix: "raw"
paths:
  # Base directories for S3 streaming
  raw_dir: "s3://truestates-ml-ops/data/raw"
  processed_dir: "s3://truestates-ml-ops/data/processed"
  model_requirements: "s3://truestates-ml-ops/data/model_requirements"

  # Ingestion
  projects_file: "projects.parquet"
  developers_file: "developers.parquet"
  buildings_file: "buildings.parquet"
  units_file: "units.parquet"
  ingestion_output: "latest_pdbu_df.csv"

  # Transaction Processing
  transactions_input: "transactions.parquet"
  transactions_output: "unit_res_trans_16.parquet"

  # Merging
  merging_input_trans: "unit_res_trans_16.parquet"
  merging_input_micro: "latest_pdbu_df.csv"
  merging_output: "latest_combined_data.parquet"
  outliers_metadata: "metadata_outliers_cleaning.csv"

  # Excel Scorecard Files
  project_grade: "project_scorecard.xlsx"
  dev_grade: "developer_scorecard.xlsx"
  bld_grade: "Dubai_RE_Classification_DLD.xlsx"

  # Regression Model
  model_input: "latest_combined_data.parquet"
  models_dir: "models"
  columns_dir: "trained_columns"
  metrics_file: "all_area_metrics.csv"
  ranges_file: "input_ranges.csv"

  # Market Forecasting
  forecast_input: "unit_res_trans_16.parquet"
  historic_output: "historic_df.csv"
  growth_output: "forecast_df.csv"
  forecast_metadata: "forecasting_metadata.csv"

  # Chronos Forecasting
  chronos_input: "unit_res_trans_16.parquet"
  chronos_output: "final_chronos_forecasts.csv"
  chronos_backtest_output: "chronos_backtest_metrics.csv"
  chronos_historic_output: "chronos_historical_baseline.csv"

  # Macro-News Impact Pipeline
  area_sens_path: "utils/area_sensitivity.json"
  entity_tiers_path: "utils/entity_tiers.json"
  event_scales_path: "utils/event_scale_bins.json"
  event_to_channel_path: "utils/event_to_channel.json"
  geo_relevance_path: "utils/geo_relevance.json"
  adjusted_forecast_output: "adjusted_macro_forecast.csv"
  news_context_file: "news_context.json"

  # Archive
  old_files_dir: "old_files"

# ==============================================================================
# MLFLOW / DAGSHUB TRACKING
# ==============================================================================
mlflow:
  repo_owner: "poojariprakash88"
  repo_name: "truestates-ml-ops"
  experiment_ingestion: "Ingestion"
  experiment_cleaning: "Cleaning"
  experiment_merging: "Merging"
  experiment_modeling: "Modeling"
  experiment_forecasting: "Forecasting"
  experiment_forecasting_news: "Forecasting_News"

drift:
  numeric_cols_for_data_drift:
    - procedure_area
    - meter_sale_price
    - Score
  model_metric_key: "r2"
  metric_drift_threshold_pct: 0.10

# ==============================================================================
# INGESTION SETTINGS
# ==============================================================================
ingestion_columns:
  projects:
    - project_id
    - project_number
    - developer_id
    - developer_number
    - master_developer_id
    - master_project_ar
    - project_start_date
    - project_end_date
    - completion_date
    - cancellation_date
    - property_id
    - area_id
    - area_name_en
    - master_project_en
    - zoning_authority_en
    - no_of_lands
    - no_of_buildings
    - no_of_villas
    - no_of_units

  developers:
    - developer_id
    - developer_number
    - developer_name_en
    - registration_date

  buildings:
    - property_id
    - area_id
    - zone_id
    - area_name_en
    - land_number
    - land_sub_number
    - building_number
    - common_area
    - actual_common_area
    - floors
    - rooms
    - rooms_en
    - built_up_area
    - bld_levels
    - swimming_pools
    - elevators
    - actual_area
    - property_type_id
    - property_type_en
    - property_sub_type_id
    - property_sub_type_en
    - parent_property_id
    - creation_date
    - project_id
    - project_name_en
    - land_type_id
    - land_type_en

ingestion_processing:
  date_columns:
    - project_start_date
    - project_end_date
    - completion_date
    - cancellation_date
    - registration_date

  drop_columns:
    - zone_id
    - land_sub_number
    - common_area
    - actual_common_area
    - rooms
    - land_type_id

# ==============================================================================
# TRANSACTION SETTINGS
# ==============================================================================
transaction_settings:
  start_filter_date: "2010-01-01"
  exclude_group:
    - "Gifts"
    - "Mortgages"
  property_usage: "Residential"
  property_type: "Unit"
  date_format: "%d-%m-%Y"

# ==============================================================================
# MERGING SETTINGS
# ==============================================================================
merging_params:
  exclude_rooms:
    - "Office"
    - "Shop"
    - "Single Room"
    - "0"
    - "No_rooms_en"
    - "Missing_rooms_en"

# ==============================================================================
# REGRESSION MODEL SETTINGS
# ==============================================================================
model_params:
  n_estimators: 300
  random_state: 42
  n_jobs: -1
  test_size: 0.2

training_columns:
  cat_cols:
    - trans_group_en
    - rooms_en
    - reg_type_en
    - floor_bin
    - Grade
    - project_grade
    - Developer_grade
    - Developer Reputation Tier
    - Locality Zone
    - Price Tier
    - Developer Tier
    - Reputation

  num_cols:
    - has_parking
    - swimming_pool
    - balcony
    - elevators
    - metro
    - procedure_area
    - Score
    - year
    - month

training_logic:
  start_date: "2020-01-01"
  target_col: "meter_sale_price"
  trans_group_filter:
    - "Sales"
  min_samples_to_train: 30
  special_areas:
    - "Wadi Al Safa 3"
  default_quantiles:
    - 0.25
    - 0.75
  special_quantiles:
    - 0.30
    - 0.65

