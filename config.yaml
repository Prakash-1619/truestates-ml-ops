mlflow:
  tracking_uri: http://51.38.112.237:5001
  experiment_name: truestates-ml-ops

ingestion_columns:
  projects:
    - project_id
    - project_number
    - developer_id
    - developer_number
    - master_developer_id
    - master_project_ar
    - project_start_date
    - project_end_date
    - completion_date
    - cancellation_date
    - property_id
    - area_id
    - area_name_en
    - master_project_en
    - zoning_authority_en
    - no_of_lands
    - no_of_buildings
    - no_of_villas
    - no_of_units
  developers:
    - developer_id
    - developer_number
    - developer_name_en
    - registration_date
  buildings:
    - property_id
    - area_id
    - zone_id
    - area_name_en
    - land_number
    - land_sub_number
    - building_number
    - common_area
    - actual_common_area
    - floors
    - rooms
    - rooms_en
    - built_up_area
    - bld_levels
    - swimming_pools
    - elevators
    - actual_area
    - property_type_id
    - property_type_en
    - property_sub_type_id
    - property_sub_type_en
    - parent_property_id
    - creation_date
    - project_id
    - project_name_en
    - land_type_id
    - land_type_en

ingestion_processing:
  date_columns:
    - project_start_date
    - project_end_date
    - completion_date
    - cancellation_date
    - registration_date
  drop_columns:
    - zone_id
    - land_sub_number
    - common_area
    - actual_common_area
    - rooms
    - land_type_id

transaction_settings:
  start_filter_date: '2010-01-01'
  exclude_group: ['Gifts', 'Mortgages']
  property_usage: Residential
  property_type: Unit
  date_format: '%d-%m-%Y'

merging_params:
  exclude_rooms: ['Office', 'Shop', 'Single Room', '0', 'No_rooms_en', 'Missing_rooms_en']

model_params:
  n_estimators: 300
  random_state: 42
  n_jobs: -1
  test_size: 0.2
