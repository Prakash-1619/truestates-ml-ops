stages:
  - run

run-pipeline:
  stage: run
  script:
    - echo "Activating virtual environment and installing dependencies..."
    - python3 -m venv venv || true
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - echo "Running main ML pipeline..."
    - python main.py
  artifacts:
    when: always
    paths:
      - pipeline_run.log
    expire_in: 7 days
